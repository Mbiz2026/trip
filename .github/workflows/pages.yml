# trip系ツールをGitHub Pagesへ自動配信するワークフロー
# 対象ファイルを更新してプッシュすると自動反映される(各アプリ: ホーム画面インストール・オフライン対応):
#   https://<owner>.github.io/trip/            航空券サーチ司令塔(flight_finder.html)
#   https://<owner>.github.io/trip/mile.html   マイルコンパス(mile_compass.html)
#   https://<owner>.github.io/trip/omamori.html 海外旅行おまもりキット(kaigai_travel_kit.html。
#     manifest/アイコンは自己完結済みのため travel_tools/pwa/ は使わない)
name: Deploy trip tools to Pages

on:
  push:
    branches: [claude/flight-search-app-55ozq4, main]
    paths:
      - travel_tools/flight_finder.html
      - travel_tools/mile_compass.html
      - travel_tools/kaigai_travel_kit.html
      - travel_tools/pwa/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Build dist (single-file app + PWA assets)
        run: |
          mkdir dist
          cp travel_tools/flight_finder.html dist/index.html
          cp travel_tools/mile_compass.html dist/mile.html
          cp travel_tools/kaigai_travel_kit.html dist/omamori.html
          cp travel_tools/pwa/* dist/
          ls -la dist
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
